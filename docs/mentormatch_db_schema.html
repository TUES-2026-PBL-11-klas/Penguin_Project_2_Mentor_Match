
<div id="erd" style="padding: 8px 0;"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#3C3489' : '#EEEDFE',
    primaryTextColor: dark ? '#CECBF6' : '#26215C',
    primaryBorderColor: dark ? '#7F77DD' : '#534AB7',
    edgeLabelBackground: dark ? '#2C2C2A' : '#F1EFE8',
    attributeBackgroundColorEven: dark ? '#26215C' : '#EEEDFE',
    attributeBackgroundColorOdd: dark ? '#2e2960' : '#F5F4FE',
  },
});

const diagram = `erDiagram
  USERS {
    uuid id PK
    string email
    string password_hash
    string first_name
    string last_name
    int grade
    string class_letter
    enum role
    string profile_picture
    timestamp created_at
    timestamp updated_at
  }
  SUBJECTS {
    int id PK
    string name
    string category
  }
  MENTOR_SUBJECTS {
    uuid id PK
    uuid mentor_id FK
    int subject_id FK
    int grade_level
  }
  AVAILABILITIES {
    uuid id PK
    uuid mentor_id FK
    int day_of_week
    time start_time
    time end_time
    boolean is_recurring
  }
  UNAVAILABLE_SLOTS {
    uuid id PK
    uuid mentor_id FK
    timestamp start_datetime
    timestamp end_datetime
    string reason
  }
  SESSIONS {
    uuid id PK
    uuid mentor_id FK
    uuid mentee_id FK
    int subject_id FK
    timestamp scheduled_at
    timestamp end_at
    int duration_minutes
    enum status
    text notes
    timestamp created_at
  }
  REVIEWS {
    uuid id PK
    uuid session_id FK
    uuid reviewer_id FK
    uuid reviewed_user_id FK
    int rating
    text comment
    timestamp created_at
  }
  NOTIFICATIONS {
    uuid id PK
    uuid user_id FK
    uuid session_id FK
    enum type
    string message
    boolean is_read
    timestamp scheduled_at
    timestamp sent_at
    timestamp created_at
  }
  PUSH_SUBSCRIPTIONS {
    uuid id PK
    uuid user_id FK
    text endpoint
    string auth
    string p256dh
  }

  USERS ||--o{ MENTOR_SUBJECTS : "teaches"
  SUBJECTS ||--o{ MENTOR_SUBJECTS : "taught in"
  USERS ||--o{ AVAILABILITIES : "available"
  USERS ||--o{ UNAVAILABLE_SLOTS : "blocks"
  USERS ||--o{ SESSIONS : "mentors"
  USERS ||--o{ SESSIONS : "attends"
  SUBJECTS ||--o{ SESSIONS : "subject of"
  SESSIONS ||--o| REVIEWS : "reviewed in"
  USERS ||--o{ REVIEWS : "writes"
  USERS ||--o{ REVIEWS : "receives"
  USERS ||--o{ NOTIFICATIONS : "notified"
  SESSIONS ||--o{ NOTIFICATIONS : "triggers"
  USERS ||--o{ PUSH_SUBSCRIPTIONS : "subscribed"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
