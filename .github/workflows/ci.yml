name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: mentormatch_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run linter (flake8)
        run: |
          cd backend
          flake8 app/ --max-line-length=120 --ignore=E501,W503,E241,W292,W293,W291,E261,E221,E302,E231,F401

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mentormatch_test
          JWT_SECRET: test_secret_key_32_characters_long
          PYTHONPATH: /home/runner/work/Penguin_Project_2_Mentor_Match/Penguin_Project_2_Mentor_Match/backend
        run: |
          cd backend
          pytest tests/ --cov=app --cov-report=term-missing --cov-fail-under=30

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker compose build

      - name: Notify on success
        if: success()
        run: echo "Build successful on $(date)"